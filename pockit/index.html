    <title>PockIt</title>

    <!-- Inter font, served by Google Fonts.
         `display=optional` tells the browser to use the fallback font
         immediately and only swap to Inter if it has been downloaded within
         ~100ms. After that the choice is locked in for the page load — no
         late swap, no flicker. The preconnects warm the TLS handshake to the
         font CDN so Inter usually wins the 100ms race on a warm network. -->
    <link rel="icon" href="/pockit/pockit-192.png" />
    <link rel="apple-touch-icon" href="/pockit/pockit-192.png" />
    <meta name="theme-color" content="#1a2026" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=optional"
    />

    <link rel="stylesheet" crossorigin href="/pockit/assets/index-DyXt2gXL.css">
